<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Dự án mẫu thử nghiệm khả năng code của tôi</title>

<!-- PWA meta tags -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- status-bar-style "default": nền status bar TRẮNG, chữ/icon hệ thống
     (giờ, pin, sóng) tự động chuyển ĐEN để đọc được trên nền sáng.
     Trước đây "black-translucent" dùng cho nền tối + icon trắng. -->
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wistron Security">
<!-- theme-color đổi sang #FFFFFF theo yêu cầu: nền status bar trắng.
     Android/iOS sẽ tự động đổi icon/chữ hệ thống (giờ, sóng, pin) sang
     màu ĐEN để đảm bảo tương phản đọc được trên nền trắng -- đây là
     hành vi tự động của hệ điều hành, không thể tùy chỉnh khác đi.
     Lưu ý: nền của #app (bên dưới status bar) vẫn giữ #2e3149 riêng,
     không đổi theo theme-color này. -->
<meta name="theme-color" content="#FFFFFF">
<style>html,body{background:#2e3149 url("background.png") center top / cover no-repeat fixed !important;}</style>

<!-- PWA Manifest (file thật) -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #2e3149;
    --navy-deep: #24263a;
    --gold: #e8b04b;
    --gold-deep: #d99a2b;
    --cream: #f7f4ec;
    --green: #3ec46d;
    --ink: #1b1c2b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}

  /* ============================================================
     FIX: Chặn chọn văn bản / menu chạm-giữ / gợi ý "Tìm trên Google"
     Đây là nguyên nhân gây ra popup Google khi nhấn giữ vào chữ.
     ============================================================ */
  html, body, #app, .phone, .screen-pass, *{
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;   /* chặn menu chạm-giữ trên iOS/Android WebView */
    -webkit-tap-highlight-color: transparent; /* bỏ highlight xanh khi chạm */
  }

  html,body{
    height:100%;
    width:100%;
    position:fixed;      /* khóa cứng, không cho trang di chuyển khi kéo tay */
    top:0; left:0;
    overflow:hidden;      /* chặn cuộn dọc/ngang gây lộ khoảng trắng */
    overscroll-behavior: none; /* chặn kéo refresh/bounce của trình duyệt */
    touch-action: none;   /* chặn mọi cử chỉ vuốt/kéo mặc định của trình duyệt */
    font-family: "Inter", "Noto Sans SC", system-ui, sans-serif;
    background: transparent;
    padding: 0;
  }
  .zh{
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  #app{
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    width:100%;
    height:100%;
    overflow:hidden;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    background-image: url('background.png');
    background-size: cover;
    background-position: center top;
    background-color: var(--navy-deep);
  }
  .phone{
    width:100%;
    height:100vh;
    height:100dvh;
    background: transparent;
    position:relative;
    overflow:hidden;
    border-radius: 0;
    display:flex;
    flex-direction:column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ============================================================
     PASS / QR SCREEN
     ============================================================ */
  .screen-pass{
    flex:1;
    display:flex;
    flex-direction:column;
    padding: 40px 26px 0;
    position:relative;
    z-index:1;
  }
  .pass-id{
    text-align:center;
    color: #E6D5AC;
    font-size:16px;
    font-weight:400;
    letter-spacing:0.4px;
    margin-bottom:14px;
    font-family: "Roboto", "Noto Sans SC", sans-serif;
  }
  .ticket-scale-wrap{
    display:flex;
    justify-content:center;
    width:100%;
    margin-bottom:-13px;
  }
  .ticket{
    background: var(--cream);
    border-radius: 6px;
    overflow:hidden;
    box-shadow: 0 13px 26px rgba(0,0,0,0.35);
    width:270px;
    flex-shrink:0;
    transform: scale(0.96);
    transform-origin: center top;
  }
  .ticket-banner{
    background: #e6ad42;
    color:#fffdf8;
    text-align:center;
    font-size:11px;
    font-weight:500;
    letter-spacing:0.6px;
    padding: 17px 13px 22px;
    position:relative;
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .ticket-notch-wrap{
    position:relative;
    height:0;
  }
  .notch{
    position:absolute;
    top:-5px;
    width:10px; height:10px;
    background: var(--navy-deep);
    border-radius:50%;
  }
  .notch.left{ left:-5px; }
  .notch.right{ right:-5px; }
  .ticket-body{
    padding: 14px 16px 14px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .qr-datetime{
    font-size:14px;
    font-weight:500;
    color:#202020;
    margin-bottom:13px;
    letter-spacing:0.3px;
    font-variant-numeric: tabular-nums;
    font-family: "Inter", sans-serif;
  }
  .qr-box{
    width:210px;
    height:210px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:14px;
    touch-action: none; /* tránh trình duyệt xử lý cử chỉ mặc định trên vùng QR */
  }
  .qr-box canvas, .qr-box img{
    width:100%;
    height:100%;
    image-rendering: pixelated;
    pointer-events: none; /* để mọi thao tác chạm đều do JS xử lý, không phải trình duyệt */
  }
  .refresh-link{
    color:#555555;
    font-size:11px;
    font-weight:400;
    margin-bottom:0;
    margin-top:0;
    cursor:pointer;
    text-decoration:none;
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .notice{
    color: #E6D5AC;
    max-width:340px;
    margin-left:auto;
    margin-right:auto;
    font-size:13px;
    font-weight:400;
    line-height:1.8;
    padding: 26px 22px 10px;
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .notice-top{
    text-align:right;
  }
  .notice-bottom{
    text-align:left;
  }
  @media (max-width:420px){
    .phone{ width:100%; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="phone">

    <!-- PASS / QR SCREEN -->
    <div class="screen-pass" id="screenPass">
      <div class="pass-id" id="passId">Phạm Văn Tuân(V25042617)</div>

      <div class="ticket-scale-wrap">
      <div class="ticket" id="ticketEl">
        <div class="ticket-banner zh">将二维码对准扫描器刷码出场</div>
        <div class="ticket-notch-wrap">
          <div class="notch left"></div>
          <div class="notch right"></div>
        </div>
        <div class="ticket-body">
          <div class="qr-datetime" id="qrDateTime">2026-5-27  10:26:24</div>
          <div class="qr-box" id="qrBox"></div>
          <div class="refresh-link zh" id="refreshBtn">刷新二维码</div>
        </div>
      </div>
      </div>

      <div class="notice zh">
        <div class="notice-top">尊敬的员工您好，您已进入企业涉密区<br>域，出于企业安全考虑，您的手机摄像头将被</div>
        <div class="notice-bottom">禁止拍摄，感谢您的配合。</div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const FIXED_CODE = 'V25042617';
  const FIXED_NAME = 'Phạm Văn Tuân';
  const FIXED_UNIT = '';

  const passId = document.getElementById('passId');
  const qrDateTime = document.getElementById('qrDateTime');
  const qrBox = document.getElementById('qrBox');
  const refreshBtn = document.getElementById('refreshBtn');

  let qrInstance = null;
  let clockInterval = null;

  function pad(n){ return n.toString().padStart(2,'0'); }

  function formatTicketDateTime(d){
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}  ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function renderQR(payload){
    qrBox.innerHTML = '';
    // QUAN TRỌNG: mã QR theo chuẩn ISO/IEC 18004 bắt buộc phải VUÔNG
    // tuyệt đối (mọi module phải có kích thước bằng nhau theo cả 2
    // trục). Trước đây width=210/height=189 (lệch 11%) khiến thư viện
    // qrcodejs vẽ module bị kéo méo theo chiều ngang -- điện thoại vẫn
    // đọc được nhờ AI bù trừ, nhưng máy quét cầm tay công nghiệp (vốn
    // tính toán lưới module theo thuật toán nghiêm ngặt hơn) có thể
    // đọc sai hoặc từ chối decode. Sửa: dùng cùng 1 giá trị vuông.
    qrInstance = new QRCode(qrBox, {
      text: payload,
      width: 210,
      height: 210,
      colorDark: '#1b1c2b',
      colorLight: '#f7f4ec',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  // Domain gốc cố định của trang (đặt đúng theo GitHub Pages repo của bạn).
  const SITE_BASE = 'https://tuanph1016.github.io/App.thunghiem.chaynha/';

  function buildPayload(ts){
    // btoa() gốc chỉ hỗ trợ Latin1 (0-255), nên tên có dấu tiếng Việt
    // (như "Phạm Văn Tuân") sẽ gây lỗi InvalidCharacterError. Cần
    // chuyển chuỗi UTF-8 sang dạng binary-safe trước khi encode.
    const toBase64Safe = (str) => btoa(unescape(encodeURIComponent(str)));
    const token = toBase64Safe(`${FIXED_CODE}:${FIXED_NAME}:${ts}`).replace(/=/g,'');

    const verifyUrl = new URL('verify.html', SITE_BASE);
    verifyUrl.searchParams.set('emp', FIXED_CODE);
    // Đã bỏ param 'name' khỏi URL: tên có dấu tiếng Việt khi percent-encode
    // trong URL bị phình to (13 ký tự -> 35 ký tự), khiến payload QR vượt
    // quá capacity của thư viện qrcodejs ở correctLevel H, gây "Script error."
    // Nếu verify.html cần hiển thị tên, hãy giải mã từ 'token' (base64 của
    // "FIXED_CODE:FIXED_NAME:ts") thay vì đọc riêng 1 param 'name'.
    verifyUrl.searchParams.set('token', token);
    verifyUrl.searchParams.set('ts', ts);

    if(location.protocol === 'file:' || location.protocol === 'content:'){
      console.warn('⚠️ Đang xem bằng file local. Mã QR vẫn trỏ đúng về ' + SITE_BASE + ' nên vẫn quét được từ máy khác, miễn là trang đã được publish lên GitHub Pages.');
    }

    return verifyUrl.href;
  }

  function startLiveClock(){
    function tick(){
      const now = new Date();
      qrDateTime.textContent = formatTicketDateTime(now);
    }
    tick();
    clockInterval = setInterval(tick, 1000);
  }

  function refreshQR(){
    const now = new Date();
    qrDateTime.textContent = formatTicketDateTime(now);
    renderQR(buildPayload(now.getTime()));
  }

  function init(){
    passId.textContent = `${FIXED_NAME}(${FIXED_CODE})`;
    const now = new Date();
    qrDateTime.textContent = formatTicketDateTime(now);
    renderQR(buildPayload(now.getTime()));
    startLiveClock();
    refreshBtn.onclick = refreshQR;

    // Giữ 2 giây trên khung QR để xem URL thật sự đang được mã hóa (debug)
    /*let pressTimer = null;
    qrBox.addEventListener('touchstart', (e) => {
      pressTimer = setTimeout(() => {
        alert('URL trong QR:\n\n' + buildPayload(Date.now()));
      }, 2000);
    });
    qrBox.addEventListener('touchend', () => clearTimeout(pressTimer));*/
  }

  init();

  // ============================================================
  // FIX BỔ SUNG: chặn menu ngữ cảnh (contextmenu) và chọn văn bản
  // toàn cục bằng JS, phòng khi trình duyệt bỏ qua CSS user-select.
  // ============================================================
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());

  // Chặn kéo/vuốt gây bounce trắng đầu trang trên các WebView cũ
  // (một số Android WebView bỏ qua touch-action:none cho cử chỉ hệ thống)
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  // ============================================================
  // ĐÃ GỠ BỎ: hàm goFullscreen() gọi document.requestFullscreen().
  //
  // NGUYÊN NHÂN GỐC của thanh trắng dưới status bar:
  // Khi PWA đã cài chạy ở chế độ "standalone" (theo manifest), việc
  // gọi thêm Fullscreen API bằng JS sẽ ép trình duyệt CHUYỂN ĐỔI
  // chế độ hiển thị từ standalone -> Fullscreen API ngay sau khi
  // trang tải xong. Quá trình chuyển đổi này khiến Android phải vẽ
  // lại layout/status bar -> gây nháy trắng lúc mở app.
  // Khi người dùng vuốt thanh trạng thái, Android tự thoát Fullscreen
  // API để lộ status bar, nhưng trang không quay lại đúng trạng thái
  // standalone ban đầu -> kẹt lại thanh trắng, không tự ẩn.
  //
  // Cách sửa đúng gốc: để MỘT NGUỒN DUY NHẤT quyết định chế độ hiển
  // thị -- "display_override": ["fullscreen"] khai báo TĨNH trong
  // manifest.webmanifest (xem hướng dẫn bên dưới), kết hợp với
  // viewport-fit=cover + env(safe-area-inset-*) đã có sẵn trong CSS.
  // Không dùng Fullscreen API bằng JS cho PWA installed nữa.
  // ============================================================

  // Đăng ký Service Worker (file thật sw.js)
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script>
</body>
</html>
