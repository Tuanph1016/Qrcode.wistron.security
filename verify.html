<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wistron Security — Verification</title>
<meta name="theme-color" content="#24263a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #24263a;
    --gold: #e6ad42;
    --green: #22c55e;
    --white: #ffffff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%;
    background: var(--navy);
    font-family: "Inter","Noto Sans SC",system-ui,sans-serif;
    color: var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .wrap{
    width:100%;
    max-width:400px;
    padding:32px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---- Circle check animation ---- */
  .check-ring{
    width:120px; height:120px;
    position:relative;
    margin-bottom:30px;
  }
  .check-ring svg{
    width:100%; height:100%;
    transform: rotate(-90deg);
  }
  .ring-bg{
    fill:none;
    stroke: rgba(34,197,94,0.15);
    stroke-width:5;
  }
  .ring-fill{
    fill:none;
    stroke: var(--green);
    stroke-width:5;
    stroke-linecap:round;
    stroke-dasharray: 283;
    stroke-dashoffset: 283;
    animation: drawRing 0.7s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
  }
  @keyframes drawRing{
    to{ stroke-dashoffset: 0; }
  }
  .check-icon{
    position:absolute;
    inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .check-icon svg{
    width:52px; height:52px;
    transform:none;
    opacity:0;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.75s forwards;
  }
  @keyframes popIn{
    from{ opacity:0; transform:scale(0.4); }
    to{ opacity:1; transform:scale(1); }
  }
  .check-icon path{
    stroke: var(--green);
    stroke-width:3.5;
    stroke-linecap:round;
    stroke-linejoin:round;
    fill:none;
    stroke-dasharray:40;
    stroke-dashoffset:40;
    animation: drawCheck 0.35s ease 1.1s forwards;
  }
  @keyframes drawCheck{
    to{ stroke-dashoffset:0; }
  }

  /* ---- Status label ---- */
  .status-label{
    font-size:22px;
    font-weight:700;
    color: var(--green);
    margin-bottom:22px;
    opacity:0;
    animation: fadeUp 0.5s ease 1.2s forwards;
    font-family:"Noto Sans SC",sans-serif;
  }

  /* ---- Employee code ---- */
  .emp-code{
    font-size:30px;
    font-weight:700;
    letter-spacing:1px;
    color:#f0ead8;
    margin-bottom:26px;
    opacity:0;
    animation: fadeUp 0.5s ease 1.35s forwards;
    font-family:"Inter",sans-serif;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---- Chinese notice lines ---- */
  .notice{
    text-align:center;
    color: var(--gold);
    font-size:14px;
    line-height:1.9;
    margin-bottom:26px;
    opacity:0;
    animation: fadeUp 0.5s ease 1.5s forwards;
    font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  }

  /* ---- Scan time ---- */
  .scan-time{
    text-align:center;
    font-size:15px;
    color:rgba(255,255,255,0.55);
    font-variant-numeric:tabular-nums;
    opacity:0;
    animation: fadeUp 0.5s ease 1.65s forwards;
    font-family:"Inter",sans-serif;
  }
  .scan-time-label{
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,0.3);
    margin-bottom:4px;
    opacity:0;
    animation: fadeUp 0.5s ease 1.6s forwards;
    font-family:"Noto Sans SC",sans-serif;
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Animated check ring -->
  <div class="check-ring">
    <svg viewBox="0 0 100 100">
      <circle class="ring-bg" cx="50" cy="50" r="45"/>
      <circle class="ring-fill" cx="50" cy="50" r="45"/>
    </svg>
    <div class="check-icon">
      <svg viewBox="0 0 48 48">
        <path d="M10 25 L20 35 L38 15"/>
      </svg>
    </div>
  </div>

  <!-- Status -->
  <div class="status-label">验证成功</div>

  <!-- Employee code -->
  <div class="emp-code" id="empId">V26042617</div>

  <!-- Chinese notice -->
  <div class="notice">
    尊敬的员工您好，您的身份已通过验证。<br>
    请配合安保人员完成出场检查，感谢您的配合。
  </div>

  <!-- Scan time -->
  <div class="scan-time-label">扫描时间</div>
  <div class="scan-time" id="scanTime">—</div>

</div>

<script>
  function pad(n){ return String(n).padStart(2,'0'); }

  function formatNow(){
    const d = new Date(); // Thời điểm thực tế thiết bị quét mở trang này
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}  ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  const params = new URLSearchParams(window.location.search);
  const emp = params.get('emp') || 'V26042617';

  document.getElementById('empId').textContent = emp;
  document.getElementById('scanTime').textContent = formatNow();
  document.title = `Verified: ${emp}`;
</script>
</body>
</html>
